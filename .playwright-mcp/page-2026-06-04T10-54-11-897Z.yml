          - paragraph [ref=e39]: I'm Westly вҖ” a Software Engineer based in the Philippines with a genuine love for building things that work, and figuring out how to make them work better.
          - paragraph [ref=e40]: I graduated with a B.S. in Computer Engineering from Lyceum of Alabang as a Dean's Lister in 2023, and jumped straight into the industry shortly after. Before that, I sharpened my full-stack fundamentals through an intensive 16-week bootcamp at Village88, where I earned Best in Capstone for QA. I then leveled up on the cloud side through AWS re/Start (Batch 9), completing training in Linux, networking, security, and core AWS services.
