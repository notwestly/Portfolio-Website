          - paragraph [ref=e42]: I'm Westly a Software Engineer based in the Philippines with a genuine love for building things that work, and figuring out how to make them work better.
          - paragraph [ref=e43]: I graduated with a B.S. in Computer Engineering from Lyceum of Alabang as a Dean's Lister in 2023, and jumped straight into the industry shortly after. Before that, I sharpened my full-stack fundamentals through an intensive 16-week bootcamp at Village88, where I earned Best in Capstone for QA. I then leveled up on the cloud side through AWS re/Start (Batch 9), completing training in Linux, networking, security, and core AWS services.
          - paragraph [ref=e44]: Most recently, I spent nearly two years at Amdocs working on live enterprise products. I was promoted from Junior to Software Engineer within seven months, went on to deliver 9 production deployments in 2025, and mentored two new hires along the way.
